<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>체크리스트</title>
<meta name="theme-color" content="#E4572E">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="stylesheet" href="style.css">
<script>
  (function () {
    var saved = localStorage.getItem('checklist_theme');
    var theme = saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    document.documentElement.dataset.theme = theme;
  })();
</script>
</head>
<body>
  <div class="side-deco side-deco-left" aria-hidden="true">
    <svg viewBox="0 0 100 100" width="84" height="84">
      <ellipse cx="50" cy="88" rx="20" ry="5" fill="#00000024"/>
      <path d="M74 8 a10 10 0 1 0 0 20 a7.5 7.5 0 1 1 0 -20 Z" fill="#F4E7C1"/>
      <circle cx="50" cy="45" r="2.5" fill="#FFE39A"/>
      <g stroke="#FFD24C" stroke-width="2.2" stroke-linecap="round">
        <line x1="50" y1="45" x2="50" y2="20"/>
        <line x1="50" y1="45" x2="68" y2="27"/>
        <line x1="50" y1="45" x2="32" y2="27"/>
      </g>
      <g stroke="#FF7AC6" stroke-width="2.2" stroke-linecap="round">
        <line x1="50" y1="45" x2="75" y2="45"/>
        <line x1="50" y1="45" x2="25" y2="45"/>
        <line x1="50" y1="45" x2="68" y2="63"/>
      </g>
      <g stroke="#6AD6D6" stroke-width="2.2" stroke-linecap="round">
        <line x1="50" y1="45" x2="32" y2="63"/>
        <line x1="50" y1="45" x2="50" y2="70"/>
      </g>
      <circle cx="50" cy="20" r="2" fill="#FFD24C"/>
      <circle cx="68" cy="27" r="2" fill="#FFD24C"/>
      <circle cx="32" cy="27" r="2" fill="#FFD24C"/>
      <circle cx="75" cy="45" r="2" fill="#FF7AC6"/>
      <circle cx="25" cy="45" r="2" fill="#FF7AC6"/>
      <circle cx="68" cy="63" r="2" fill="#FF7AC6"/>
      <circle cx="32" cy="63" r="2" fill="#6AD6D6"/>
      <circle cx="50" cy="70" r="2" fill="#6AD6D6"/>
      <path d="M14 82 Q50 68 86 82 L86 90 Q50 78 14 90 Z" fill="#3A2760"/>
    </svg>
    <svg viewBox="0 0 100 100" width="76" height="76">
      <ellipse cx="50" cy="92" rx="18" ry="5" fill="#00000018"/>
      <line x1="50" y1="8" x2="50" y2="24" stroke="#6B4A2A" stroke-width="2"/>
      <ellipse cx="50" cy="52" rx="24" ry="28" fill="#FF9E6B"/>
      <ellipse cx="50" cy="52" rx="24" ry="28" fill="none" stroke="#C4432B" stroke-width="2"/>
      <line x1="30" y1="34" x2="70" y2="34" stroke="#C4432B" stroke-width="1.5" opacity="0.6"/>
      <line x1="26" y1="52" x2="74" y2="52" stroke="#C4432B" stroke-width="1.5" opacity="0.6"/>
      <line x1="30" y1="70" x2="70" y2="70" stroke="#C4432B" stroke-width="1.5" opacity="0.6"/>
      <circle cx="50" cy="52" r="10" fill="#FFE39A" opacity="0.85"/>
      <path d="M42 80 Q50 92 58 80" stroke="#C4432B" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <circle cx="50" cy="92" r="2.5" fill="#C4432B"/>
    </svg>
  </div>

  <div class="side-deco side-deco-right" aria-hidden="true">
    <svg viewBox="0 0 100 100" width="84" height="84">
      <ellipse cx="50" cy="90" rx="18" ry="5" fill="#00000024"/>
      <path d="M20 45 C20 25 40 18 50 18 C60 18 80 25 80 45 C80 60 65 58 50 58 C35 58 20 60 20 45 Z" fill="#4A2B6B"/>
      <path d="M20 45 C20 25 40 18 50 18 C60 18 80 25 80 45 C80 60 65 58 50 58 C35 58 20 60 20 45 Z" fill="none" stroke="#9B7FD4" stroke-width="2"/>
      <path d="M30 40 Q36 32 44 38 Q38 44 30 40 Z" fill="#2B1B4A"/>
      <path d="M62 34 l3.5 8 8.5 1 -6.3 5.7 1.8 8.3 -7.5 -4.5 -7.5 4.5 1.8 -8.3 -6.3 -5.7 8.5 -1 z" fill="#FFD24C"/>
      <path d="M42 58 Q50 66 58 58" stroke="#2B1B4A" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <line x1="20" y1="42" x2="8" y2="36" stroke="#9B7FD4" stroke-width="2" stroke-linecap="round"/>
      <line x1="80" y1="42" x2="92" y2="36" stroke="#9B7FD4" stroke-width="2" stroke-linecap="round"/>
    </svg>
    <svg viewBox="0 0 100 100" width="76" height="76">
      <ellipse cx="50" cy="90" rx="16" ry="5" fill="#00000018"/>
      <path d="M20 20 Q50 50 30 85" stroke="#9B7FD4" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.5"/>
      <circle cx="22" cy="24" r="3" fill="#FFD24C"/>
      <circle cx="38" cy="40" r="2.5" fill="#FF7AC6"/>
      <circle cx="26" cy="52" r="2" fill="#6AD6D6"/>
      <circle cx="40" cy="64" r="2.5" fill="#FFD24C"/>
      <circle cx="28" cy="76" r="2" fill="#FF7AC6"/>
      <path d="M62 30 l1.8 4.2 4.2 0.6 -3.2 3 0.8 4.2 -3.6 -2.2 -3.6 2.2 0.8 -4.2 -3.2 -3 4.2 -0.6 z" fill="#FFD24C"/>
      <path d="M74 55 l1.4 3.2 3.2 0.5 -2.4 2.3 0.5 3.2 -2.7 -1.5 -2.7 1.5 0.5 -3.2 -2.4 -2.3 3.2 -0.5 z" fill="#6AD6D6"/>
    </svg>
  </div>

  <div class="app">
    <header class="header">
      <h1>🍁 체크리스트</h1>
      <div class="header-actions">
        <button id="themeToggleBtn" class="icon-btn" title="다크모드 전환">🌙</button>
        <button id="notifyBtn" class="icon-btn" title="알림 켜기">🔔</button>
        <button id="syncBtn" class="icon-btn" title="다른 기기와 연동">🔗</button>
      </div>
    </header>

    <section id="syncPanel" class="sync-panel hidden">
      <div class="sync-row">
        <span>내 코드</span>
        <code id="roomCodeDisplay">------</code>
        <button id="copyCodeBtn" class="small-btn">복사</button>
      </div>
      <div class="sync-row">
        <input id="joinCodeInput" type="text" placeholder="다른 기기 코드 입력" maxlength="6" autocapitalize="characters">
        <button id="joinBtn" class="small-btn">연결</button>
      </div>
      <p id="syncStatus" class="sync-status"></p>
    </section>

    <p id="notifyStatus" class="sync-status hidden"></p>

    <div class="level-row">
      <div class="level-card level-card-game">
        <span class="level-icon">🎮</span>
        <div class="level-info">
          <span class="level-label">게임</span>
          <span id="gameLevelValue" class="level-value">Lv.1</span>
        </div>
        <span id="gameLevelDays" class="level-days">완료한 날 0일</span>
      </div>
      <div class="level-card level-card-study">
        <span class="level-icon">📚</span>
        <div class="level-info">
          <span class="level-label">학업</span>
          <span id="studyLevelValue" class="level-value">Lv.1</span>
        </div>
        <span id="studyLevelDays" class="level-days">완료한 날 0일</span>
      </div>
    </div>

    <nav class="tab-nav">
      <button id="todayTabBtn" class="tab-btn active">오늘</button>
      <button id="calendarTabBtn" class="tab-btn">달력</button>
      <button id="notesTabBtn" class="tab-btn">오답노트</button>
    </nav>

    <div id="todayView">
      <form id="addForm" class="add-form">
        <input id="taskInput" type="text" placeholder="할 일을 입력하세요" required>
        <select id="taskCategoryInput">
          <option value="game">게임</option>
          <option value="study">학업</option>
        </select>
        <select id="taskType">
          <option value="daily">매일</option>
          <option value="weekly">매주</option>
          <option value="date">날짜 지정</option>
        </select>
        <input id="taskDateInput" type="date" class="hidden">
        <select id="taskWeekdayInput" class="hidden">
          <option value="">요일 상관없음</option>
          <option value="0">일요일</option>
          <option value="1">월요일</option>
          <option value="2">화요일</option>
          <option value="3">수요일</option>
          <option value="4">목요일</option>
          <option value="5">금요일</option>
          <option value="6">토요일</option>
        </select>
        <button type="submit" class="add-btn">추가</button>
      </form>

      <nav class="category-filter">
        <button class="cat-btn active" data-category="all">전체</button>
        <button class="cat-btn" data-category="game">게임</button>
        <button class="cat-btn" data-category="study">학업</button>
      </nav>

      <div class="exp-bar-wrap">
        <div class="exp-bar-track">
          <div id="gameExpFill" class="exp-bar-fill exp-bar-fill-game" style="width: 0%"></div>
        </div>
        <p id="gameExpLabel" class="exp-bar-label">게임 경험치 0%</p>
      </div>

      <div class="exp-bar-wrap">
        <div class="exp-bar-track">
          <div id="studyExpFill" class="exp-bar-fill exp-bar-fill-study" style="width: 0%"></div>
        </div>
        <p id="studyExpLabel" class="exp-bar-label">학업 경험치 0%</p>
      </div>

      <section class="list-section">
        <h2>매일 할 일</h2>
        <ul id="dailyList" class="task-list"></ul>
      </section>

      <section class="list-section">
        <h2>매주 할 일</h2>
        <ul id="weeklyList" class="task-list"></ul>
      </section>

      <section class="list-section">
        <h2>날짜 지정 (오늘)</h2>
        <ul id="dateList" class="task-list"></ul>
      </section>
    </div>

    <div id="calendarView" class="hidden">
      <div class="calendar-header">
        <button id="prevMonthBtn" class="icon-btn small">◀</button>
        <h2 id="calendarMonthLabel">2026년 7월</h2>
        <button id="nextMonthBtn" class="icon-btn small">▶</button>
      </div>
      <div class="calendar-weekdays">
        <span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span>
      </div>
      <div id="calendarGrid" class="calendar-grid"></div>
      <div class="calendar-legend">
        <span><i class="dot full"></i>모두 완료</span>
        <span><i class="dot partial"></i>일부 완료</span>
        <span><i class="dot none"></i>미완료</span>
      </div>
      <div id="dayDetail" class="day-detail hidden">
        <h3 id="dayDetailTitle"></h3>
        <ul id="dayDetailList" class="task-list"></ul>
      </div>
    </div>

    <div id="notesView" class="hidden">
      <button id="reviewBtn" type="button" class="add-btn review-toggle-btn">🔀 복습하기</button>

      <section id="reviewSetupPanel" class="sync-panel hidden">
        <p class="review-setup-title">복습할 폴더를 선택하세요</p>
        <div id="reviewUnitCheckboxes" class="review-unit-checkboxes"></div>
        <div class="sync-row">
          <span>문제 수</span>
          <input id="reviewCountInput" type="number" min="1" value="5">
          <button id="startReviewBtn" class="small-btn">시작</button>
        </div>
        <p id="reviewSetupHint" class="sync-status"></p>
      </section>

      <section id="reviewPlayPanel" class="sync-panel hidden">
        <p id="reviewProgress" class="review-progress"></p>
        <div class="note-item review-card">
          <p id="reviewCardTitle" class="review-card-title"></p>
          <p id="reviewCardMeta" class="note-meta"></p>
          <p id="reviewCardContent" class="note-content hidden"></p>
          <img id="reviewCardImage" class="note-thumb hidden" alt="첨부 사진">
          <button id="revealBtn" class="small-btn">정답 보기</button>
        </div>
        <div id="reviewGradeRow" class="review-grade-row">
          <button id="gradeForgotBtn" class="grade-btn grade-forgot">기억 안남</button>
          <button id="gradeRememberedBtn" class="grade-btn grade-remembered">기억함</button>
        </div>
        <button id="reviewEndBtn" class="tab-btn review-end-btn">종료</button>
      </section>

      <nav id="unitBreadcrumb" class="unit-breadcrumb"></nav>

      <div id="unitGrid" class="unit-grid"></div>

      <form id="addUnitForm" class="add-form">
        <input id="unitInput" type="text" placeholder="새 폴더 이름" required>
        <button type="submit" class="add-btn">폴더 추가</button>
      </form>

      <div class="note-toolbar">
        <input id="noteSearchInput" type="text" class="note-search" placeholder="🔍 전체 폴더에서 검색">
        <select id="noteSortSelect" class="note-sort-select">
          <option value="recent">최신순</option>
          <option value="rateAsc">기억률 낮은순</option>
          <option value="rateDesc">기억률 높은순</option>
          <option value="oldReview">오래된순</option>
        </select>
      </div>

      <form id="addNoteForm" class="add-form note-add-form hidden">
        <input id="noteTitleInput" type="text" placeholder="개념/문제 제목" required>
        <textarea id="noteContentInput" rows="3" placeholder="틀린 이유, 헷갈린 부분, 정리 내용" required></textarea>
        <div class="note-image-field">
          <label for="noteImageInput" class="note-image-btn">📷 사진 첨부 (선택)</label>
          <input id="noteImageInput" type="file" accept="image/*" class="hidden">
          <div id="noteImagePreviewWrap" class="note-image-preview-wrap hidden">
            <img id="noteImagePreview" class="note-image-preview" alt="첨부 사진 미리보기">
            <button type="button" id="noteImageRemoveBtn" class="note-image-remove-btn">✕</button>
          </div>
        </div>
        <button type="submit" class="add-btn">노트 추가</button>
      </form>
      <p id="noteAddHint" class="sync-status hidden"></p>

      <ul id="notesList" class="task-list note-list"></ul>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
