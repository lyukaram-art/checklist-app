<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>체크리스트</title>
<meta name="theme-color" content="#E4572E">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="side-deco side-deco-left" aria-hidden="true">
    <svg viewBox="0 0 100 100" width="84" height="84">
      <ellipse cx="50" cy="78" rx="16" ry="6" fill="#00000014"/>
      <rect x="42" y="55" width="16" height="20" rx="6" fill="#F1E2C3"/>
      <path d="M20 50 C20 25 80 25 80 50 C80 60 65 62 50 62 C35 62 20 60 20 50 Z" fill="#E4572E"/>
      <ellipse cx="35" cy="40" rx="6" ry="4" fill="#FFF3D6"/>
      <ellipse cx="58" cy="35" rx="5" ry="3.5" fill="#FFF3D6"/>
      <ellipse cx="68" cy="47" rx="4.5" ry="3" fill="#FFF3D6"/>
      <circle cx="42" cy="56" r="3" fill="#4A2C13"/>
      <circle cx="58" cy="56" r="3" fill="#4A2C13"/>
      <path d="M45 62 Q50 66 55 62" stroke="#4A2C13" stroke-width="2" fill="none" stroke-linecap="round"/>
    </svg>
    <svg viewBox="0 0 100 100" width="76" height="76">
      <ellipse cx="50" cy="86" rx="20" ry="5" fill="#00000014"/>
      <path d="M25 82 C15 82 12 55 30 45 C48 35 62 45 60 60 C58 74 40 82 25 82 Z" fill="#FFF8E7" stroke="#E8C89A" stroke-width="2"/>
      <path d="M30 45 C40 40 35 30 45 26 C50 34 46 42 38 46 Z" fill="#FFC93C" opacity="0.8"/>
      <circle cx="70" cy="55" r="12" fill="#8FCB90"/>
      <path d="M70 43 Q66 30 60 26" stroke="#4A2C13" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <path d="M76 45 Q76 32 82 26" stroke="#4A2C13" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <circle cx="60" cy="26" r="3" fill="#4A2C13"/>
      <circle cx="82" cy="26" r="3" fill="#4A2C13"/>
      <circle cx="66" cy="55" r="2.5" fill="#4A2C13"/>
      <circle cx="75" cy="55" r="2.5" fill="#4A2C13"/>
    </svg>
  </div>

  <div class="side-deco side-deco-right" aria-hidden="true">
    <svg viewBox="0 0 100 100" width="84" height="84">
      <ellipse cx="50" cy="84" rx="18" ry="6" fill="#00000014"/>
      <ellipse cx="50" cy="55" rx="30" ry="24" fill="#F5B8C4"/>
      <path d="M26 38 L20 20 L38 32 Z" fill="#F5B8C4"/>
      <path d="M74 38 L80 20 L62 32 Z" fill="#F5B8C4"/>
      <ellipse cx="50" cy="60" rx="12" ry="9" fill="#E88CA0"/>
      <circle cx="45" cy="60" r="2.5" fill="#8B3A1A"/>
      <circle cx="55" cy="60" r="2.5" fill="#8B3A1A"/>
      <circle cx="36" cy="48" r="3" fill="#4A2C13"/>
      <circle cx="64" cy="48" r="3" fill="#4A2C13"/>
      <path d="M78 66 Q88 66 86 58" stroke="#E88CA0" stroke-width="3" fill="none" stroke-linecap="round"/>
    </svg>
    <svg viewBox="0 0 100 100" width="76" height="76">
      <ellipse cx="50" cy="82" rx="22" ry="6" fill="#00000014"/>
      <path d="M22 78 C10 60 20 34 50 34 C80 34 90 60 78 78 C68 90 32 90 22 78 Z" fill="#8FCB90"/>
      <ellipse cx="38" cy="46" rx="7" ry="5" fill="#C9EAC9" opacity="0.7"/>
      <circle cx="38" cy="60" r="4" fill="#2C4A2C"/>
      <circle cx="62" cy="60" r="4" fill="#2C4A2C"/>
      <path d="M40 70 Q50 76 60 70" stroke="#2C4A2C" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    </svg>
  </div>

  <div class="app">
    <header class="header">
      <h1>🍁 체크리스트</h1>
      <div class="header-actions">
        <button id="notifyBtn" class="icon-btn" title="알림 켜기">🔔</button>
        <button id="syncBtn" class="icon-btn" title="다른 기기와 연동">🔗</button>
      </div>
    </header>

    <section id="syncPanel" class="sync-panel hidden">
      <div class="sync-row">
        <span>내 코드</span>
        <code id="roomCodeDisplay">------</code>
        <button id="copyCodeBtn" class="small-btn">복사</button>
      </div>
      <div class="sync-row">
        <input id="joinCodeInput" type="text" placeholder="다른 기기 코드 입력" maxlength="6" autocapitalize="characters">
        <button id="joinBtn" class="small-btn">연결</button>
      </div>
      <p id="syncStatus" class="sync-status"></p>
    </section>

    <p id="notifyStatus" class="sync-status hidden"></p>

    <div class="level-row">
      <div class="level-card level-card-game">
        <span class="level-icon">🎮</span>
        <div class="level-info">
          <span class="level-label">게임</span>
          <span id="gameLevelValue" class="level-value">Lv.1</span>
        </div>
        <span id="gameLevelDays" class="level-days">완료한 날 0일</span>
      </div>
      <div class="level-card level-card-study">
        <span class="level-icon">📚</span>
        <div class="level-info">
          <span class="level-label">학업</span>
          <span id="studyLevelValue" class="level-value">Lv.1</span>
        </div>
        <span id="studyLevelDays" class="level-days">완료한 날 0일</span>
      </div>
    </div>

    <nav class="tab-nav">
      <button id="todayTabBtn" class="tab-btn active">오늘</button>
      <button id="calendarTabBtn" class="tab-btn">달력</button>
      <button id="notesTabBtn" class="tab-btn">오답노트</button>
    </nav>

    <div id="todayView">
      <form id="addForm" class="add-form">
        <input id="taskInput" type="text" placeholder="할 일을 입력하세요" required>
        <select id="taskCategoryInput">
          <option value="game">게임</option>
          <option value="study">학업</option>
        </select>
        <select id="taskType">
          <option value="daily">매일</option>
          <option value="weekly">매주</option>
          <option value="date">날짜 지정</option>
        </select>
        <input id="taskDateInput" type="date" class="hidden">
        <select id="taskWeekdayInput" class="hidden">
          <option value="">요일 상관없음</option>
          <option value="0">일요일</option>
          <option value="1">월요일</option>
          <option value="2">화요일</option>
          <option value="3">수요일</option>
          <option value="4">목요일</option>
          <option value="5">금요일</option>
          <option value="6">토요일</option>
        </select>
        <button type="submit" class="add-btn">추가</button>
      </form>

      <nav class="category-filter">
        <button class="cat-btn active" data-category="all">전체</button>
        <button class="cat-btn" data-category="game">게임</button>
        <button class="cat-btn" data-category="study">학업</button>
      </nav>

      <div class="exp-bar-wrap">
        <div class="exp-bar-track">
          <div id="gameExpFill" class="exp-bar-fill exp-bar-fill-game" style="width: 0%"></div>
        </div>
        <p id="gameExpLabel" class="exp-bar-label">게임 경험치 0%</p>
      </div>

      <div class="exp-bar-wrap">
        <div class="exp-bar-track">
          <div id="studyExpFill" class="exp-bar-fill exp-bar-fill-study" style="width: 0%"></div>
        </div>
        <p id="studyExpLabel" class="exp-bar-label">학업 경험치 0%</p>
      </div>

      <section class="list-section">
        <h2>매일 할 일</h2>
        <ul id="dailyList" class="task-list"></ul>
      </section>

      <section class="list-section">
        <h2>매주 할 일</h2>
        <ul id="weeklyList" class="task-list"></ul>
      </section>

      <section class="list-section">
        <h2>날짜 지정 (오늘)</h2>
        <ul id="dateList" class="task-list"></ul>
      </section>
    </div>

    <div id="calendarView" class="hidden">
      <div class="calendar-header">
        <button id="prevMonthBtn" class="icon-btn small">◀</button>
        <h2 id="calendarMonthLabel">2026년 7월</h2>
        <button id="nextMonthBtn" class="icon-btn small">▶</button>
      </div>
      <div class="calendar-weekdays">
        <span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span>
      </div>
      <div id="calendarGrid" class="calendar-grid"></div>
      <div class="calendar-legend">
        <span><i class="dot full"></i>모두 완료</span>
        <span><i class="dot partial"></i>일부 완료</span>
        <span><i class="dot none"></i>미완료</span>
      </div>
      <div id="dayDetail" class="day-detail hidden">
        <h3 id="dayDetailTitle"></h3>
        <ul id="dayDetailList" class="task-list"></ul>
      </div>
    </div>

    <div id="notesView" class="hidden">
      <button id="reviewBtn" type="button" class="add-btn review-toggle-btn">🔀 복습하기</button>

      <section id="reviewSetupPanel" class="sync-panel hidden">
        <p class="review-setup-title">복습할 폴더를 선택하세요</p>
        <div id="reviewUnitCheckboxes" class="review-unit-checkboxes"></div>
        <div class="sync-row">
          <span>문제 수</span>
          <input id="reviewCountInput" type="number" min="1" value="5">
          <button id="startReviewBtn" class="small-btn">시작</button>
        </div>
        <p id="reviewSetupHint" class="sync-status"></p>
      </section>

      <section id="reviewPlayPanel" class="sync-panel hidden">
        <p id="reviewProgress" class="review-progress"></p>
        <div class="note-item review-card">
          <div class="review-card-header">
            <button id="reviewCardCheck" class="task-check" title="복습 완료 표시"></button>
            <p id="reviewCardTitle" class="review-card-title"></p>
          </div>
          <p id="reviewCardContent" class="note-content hidden"></p>
          <button id="revealBtn" class="small-btn">정답 보기</button>
        </div>
        <div class="review-nav">
          <button id="reviewEndBtn" class="tab-btn">종료</button>
          <button id="reviewNextBtn" class="add-btn">다음</button>
        </div>
      </section>

      <nav id="unitBreadcrumb" class="unit-breadcrumb"></nav>

      <div id="unitGrid" class="unit-grid"></div>

      <form id="addUnitForm" class="add-form">
        <input id="unitInput" type="text" placeholder="새 폴더 이름" required>
        <button type="submit" class="add-btn">폴더 추가</button>
      </form>

      <input id="noteSearchInput" type="text" class="note-search" placeholder="🔍 전체 폴더에서 검색">

      <form id="addNoteForm" class="add-form note-add-form hidden">
        <input id="noteTitleInput" type="text" placeholder="개념/문제 제목" required>
        <textarea id="noteContentInput" rows="3" placeholder="틀린 이유, 헷갈린 부분, 정리 내용" required></textarea>
        <button type="submit" class="add-btn">노트 추가</button>
      </form>
      <p id="noteAddHint" class="sync-status hidden"></p>

      <ul id="notesList" class="task-list note-list"></ul>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
